# Netlify build for a Next.js static export.
#
# `output: "export"` in next.config.ts means there is no server: `next build`
# writes plain files to out/ and Netlify serves them. No @netlify/plugin-nextjs,
# no functions, no edge runtime — the whole site is static and should stay that
# way, because nothing on it needs a server.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  # Pin the major so a Netlify default bump cannot silently change the build.
  NODE_VERSION = "22"
  # Next reads this to decide dev vs prod. Leave it to Next; setting it here is how
  # you get a "non-standard NODE_ENV" build that ships a dev React bundle.

# Security headers. A static marketing site needs almost nothing, so the policy
# says almost nothing is allowed.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    # Netlify redirects HTTP to HTTPS on its own, but a default you have not written
    # down is a default that can change under you, and the first request of a fresh
    # visit is the one that travels in clear. Two years, subdomains included, preload
    # eligible. Note the consequence before touching it: with preload, browsers refuse
    # plain HTTP to this host for the whole max-age, and there is no fast way back.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Every face is served from /fonts now, so no font CDN origin is allowed anywhere:
    # not here, not in the generated CSP. If a face ever comes back from a CDN, the hole
    # comes back with it, deliberately, in scripts/csp-headers.mjs.
    # The CSP is NOT here on purpose. It carries a SHA-256 of every inline script this
    # build emits, and netlify.toml is read before the build runs, so it cannot know
    # them. scripts/csp-headers.mjs writes out/_headers from the artifact that ships.
    # Do not add a Content-Security-Policy back to this file: netlify.toml wins over
    # _headers on conflict, so it would silently replace the hashed policy with a
    # weaker one and nothing would fail.

# The subset wordmark and any future hashed asset: immutable, they are content-addressed
# by their own name and never change under it.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next's ImageResponse route exports to a file with NO extension (out/opengraph-image),
# so a static host serves it as application/octet-stream and every social scraper
# silently refuses the card. It is a real PNG; say so.
[[headers]]
  for = "/opengraph-image"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=86400"

# llms.txt is the file answer engines read. Short cache so a release shows up fast.
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"
